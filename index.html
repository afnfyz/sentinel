<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      /* body is NOT a drag region — mascots use a drag handle */
    }

    button { -webkit-app-region: no-drag; }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 16px;
      gap: 12px;
    }

    /* ── Each mascot slot ── */
    .mascot-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      opacity: 1;
      transition: opacity 500ms ease-out;
    }
    .mascot-slot.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── The mascot figure — drag region, click handled via JS ── */
    .mascot-figure {
      cursor: grab;
      position: relative;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .mascot-figure:active { cursor: grabbing; }

    /* ── SVG mascot body ── */
    .mascot-svg {
      width: 56px;
      height: 56px;
      overflow: visible;
    }

    /* ── Idle: gentle float ── */
    .mascot-slot.s-idle .mascot-body-group {
      animation: float 3.2s ease-in-out infinite;
    }

    /* ── Thinking: slow bob + eyes moving ── */
    .mascot-slot.s-thinking .mascot-body-group {
      animation: thinking-bob 1.8s ease-in-out infinite;
    }
    .mascot-slot.s-thinking .eye-l,
    .mascot-slot.s-thinking .eye-r {
      animation: eyes-look 1.8s ease-in-out infinite;
    }

    /* ── Working: fast bounce ── */
    .mascot-slot.s-working .mascot-body-group {
      animation: working-bounce 0.55s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
    }

    /* ── Approval: urgent shake ── */
    .mascot-slot.s-approval .mascot-body-group {
      animation: shake 0.4s ease-in-out infinite;
    }

    /* ── Success: happy jump ── */
    .mascot-slot.s-success .mascot-body-group {
      animation: jump 0.6s ease-out forwards;
    }

    /* ── Error/Warning: droop ── */
    .mascot-slot.s-error .mascot-body-group,
    .mascot-slot.s-warning .mascot-body-group {
      animation: droop 0.5s ease-out forwards;
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-5px); }
    }
    @keyframes thinking-bob {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      30%     { transform: translateY(-3px) rotate(-4deg); }
      70%     { transform: translateY(-3px) rotate(4deg); }
    }
    @keyframes eyes-look {
      0%,100% { transform: translateX(0); }
      40%     { transform: translateX(-1.5px); }
      80%     { transform: translateX(1.5px); }
    }
    @keyframes working-bounce {
      0%,100% { transform: translateY(0px) scaleY(1) scaleX(1); }
      20%     { transform: translateY(-8px) scaleY(1.1) scaleX(0.93); }
      45%     { transform: translateY(0px) scaleY(0.88) scaleX(1.1); }
      65%     { transform: translateY(-3px) scaleY(1.04) scaleX(0.97); }
      80%     { transform: translateY(0px) scaleY(0.96) scaleX(1.03); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-4px) rotate(-3deg); }
      40%     { transform: translateX(4px)  rotate(3deg); }
      60%     { transform: translateX(-4px) rotate(-2deg); }
      80%     { transform: translateX(3px)  rotate(2deg); }
    }
    @keyframes jump {
      0%   { transform: translateY(0) scaleY(1); }
      30%  { transform: translateY(-14px) scaleY(1.05); }
      55%  { transform: translateY(0) scaleY(0.92) scaleX(1.08); }
      70%  { transform: translateY(-5px) scaleY(1.02); }
      85%  { transform: translateY(0) scaleY(0.97); }
      100% { transform: translateY(0) scaleY(1); }
    }
    @keyframes droop {
      0%   { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(3px) rotate(-5deg); }
    }

    /* ── Status name tag under mascot ── */
    .mascot-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      padding: 2px 0;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    /* ── Status indicator ring around mascot ── */
    .mascot-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 400ms ease-out, box-shadow 400ms ease-out;
      pointer-events: none;
    }
    .s-thinking .mascot-ring { border-color: rgba(155,127,212,0.5); box-shadow: 0 0 10px rgba(155,127,212,0.3); }
    .s-working  .mascot-ring { border-color: rgba(212,168,67,0.6);  box-shadow: 0 0 10px rgba(212,168,67,0.3); animation: ring-spin 1s linear infinite; }
    .s-approval .mascot-ring { border-color: rgba(215,25,33,0.7);   box-shadow: 0 0 14px rgba(215,25,33,0.4); }
    .s-success  .mascot-ring { border-color: rgba(74,158,92,0.6);   box-shadow: 0 0 12px rgba(74,158,92,0.35); }

    @keyframes ring-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Approval buttons (show on hover when needs_approval) ── */
    .approval-btns {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      gap: 5px;
      white-space: nowrap;
    }
    .s-approval .approval-btns { display: flex; }

    .abtn {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 150ms;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      -webkit-app-region: no-drag;
    }
    .abtn:hover  { opacity: 0.75; }
    .abtn:active { opacity: 0.5; }
    .abtn-approve {
      background: rgba(74,158,92,0.2);
      border: 1px solid rgba(74,158,92,0.8);
      color: #6FCF87;
    }
    .abtn-deny {
      background: rgba(215,25,33,0.2);
      border: 1px solid rgba(215,25,33,0.8);
      color: #FF6B6B;
    }

    /* ── Log popover — fixed positioned via JS so it never clips ── */
    #log-popover {
      position: fixed;
      width: 260px;
      background: rgba(10,10,10,0.94);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease-out, transform 200ms ease-out;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      transform: scale(0.95);
      transform-origin: bottom left;
      z-index: 9999;
    }
    #log-popover.open {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .popover-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .popover-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .popover-task {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      font-style: normal;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-feed {
      max-height: 200px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .log-feed::-webkit-scrollbar { width: 2px; }
    .log-feed::-webkit-scrollbar-track { background: transparent; }
    .log-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 1px; }

    .log-row {
      display: flex;
      align-items: baseline;
      gap: 7px;
      padding: 5px 14px;
    }
    .log-row + .log-row { border-top: 1px solid rgba(255,255,255,0.04); }

    .log-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
      background: rgba(255,255,255,0.2);
    }
    .log-row.ls-success        .log-dot { background: #4A9E5C; }
    .log-row.ls-working        .log-dot { background: #D4A843; }
    .log-row.ls-thinking       .log-dot { background: #9B7FD4; }
    .log-row.ls-needs_approval .log-dot { background: #D71921; }
    .log-row.ls-error          .log-dot,
    .log-row.ls-warning        .log-dot { background: #D71921; }

    .log-text {
      flex: 1;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      line-height: 1.4;
    }
    .log-text strong { color: rgba(255,255,255,0.85); font-weight: 500; }

    .log-time {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .log-empty {
      padding: 16px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="mascots-area"></div>

  <!-- Single shared log popover, positioned by JS -->
  <div id="log-popover">
    <div class="popover-header">
      <span class="popover-title"></span>
      <span class="popover-task"></span>
    </div>
    <div id="log-feed" class="log-feed"></div>
  </div>

  <script>
    const IDLE_TIMEOUT = 120000; // 2 min

    let sessions    = {};
    let history     = [];
    let hideTimers  = {};
    let openLog     = null; // id of agent whose log is open
    let eventSource = null;

    // ── SVG mascot per agent ──────────────────────────────────────────────
    function buildMascotSVG(id, name) {
      const n = (name || id || '').toUpperCase();
      // Color per agent
      let bodyColor, eyeColor, blushColor;
      if (n.startsWith('GEMINI') || n === 'MAIN') {
        bodyColor  = '#4285F4'; // Google blue
        eyeColor   = '#FFFFFF';
        blushColor = '#86AEFA';
      } else if (n.startsWith('CLAUDE')) {
        bodyColor  = '#CC785C'; // Claude orange/brown
        eyeColor   = '#FFFFFF';
        blushColor = '#E8A88A';
      } else {
        bodyColor  = '#888888';
        eyeColor   = '#FFFFFF';
        blushColor = '#AAAAAA';
      }

      // SVG: round blob body, two eyes, rosy cheeks, little feet
      return `
<svg class="mascot-svg" viewBox="0 0 56 62" xmlns="http://www.w3.org/2000/svg">
  <g class="mascot-body-group" style="transform-origin: 28px 48px">

    <!-- Shadow -->
    <ellipse cx="28" cy="59" rx="12" ry="3.5" fill="rgba(0,0,0,0.25)"/>

    <!-- Feet -->
    <ellipse cx="20" cy="56" rx="6" ry="3.5" fill="${bodyColor}" opacity="0.8"/>
    <ellipse cx="36" cy="56" rx="6" ry="3.5" fill="${bodyColor}" opacity="0.8"/>

    <!-- Body blob -->
    <ellipse cx="28" cy="34" rx="18" ry="20" fill="${bodyColor}"/>

    <!-- Belly highlight -->
    <ellipse cx="28" cy="37" rx="9" ry="10" fill="rgba(255,255,255,0.12)"/>

    <!-- Left eye white -->
    <ellipse cx="21" cy="28" rx="5.5" ry="6" fill="${eyeColor}"/>
    <!-- Right eye white -->
    <ellipse cx="35" cy="28" rx="5.5" ry="6" fill="${eyeColor}"/>

    <!-- Left pupil -->
    <circle class="eye-l" cx="22" cy="29" r="2.8" fill="#1a1a1a"/>
    <!-- Right pupil -->
    <circle class="eye-r" cx="36" cy="29" r="2.8" fill="#1a1a1a"/>

    <!-- Left eye shine -->
    <circle cx="23.2" cy="27.5" r="1" fill="rgba(255,255,255,0.9)"/>
    <!-- Right eye shine -->
    <circle cx="37.2" cy="27.5" r="1" fill="rgba(255,255,255,0.9)"/>

    <!-- Blush left -->
    <ellipse cx="16" cy="34" rx="3.5" ry="2" fill="${blushColor}" opacity="0.6"/>
    <!-- Blush right -->
    <ellipse cx="40" cy="34" rx="3.5" ry="2" fill="${blushColor}" opacity="0.6"/>

    <!-- Smile (default) -->
    <path class="mouth-smile" d="M 23 38 Q 28 43 33 38" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1.8" stroke-linecap="round"/>

  </g>
</svg>`;
    }

    // ── Build / update mascot slot ────────────────────────────────────────
    function getOrCreateSlot(s) {
      const area = document.getElementById('mascots-area');
      let slot = area.querySelector(`[data-id="${s.id}"]`);
      if (!slot) {
        slot = document.createElement('div');
        slot.className = 'mascot-slot';
        slot.dataset.id = s.id;
        slot.innerHTML = `
          <div class="mascot-figure">
            <div class="mascot-ring"></div>
            ${buildMascotSVG(s.id, s.name)}
            <div class="approval-btns">
              <button class="abtn abtn-approve">OK</button>
              <button class="abtn abtn-deny">No</button>
            </div>
          </div>
          <div class="mascot-label">${(s.name || s.id).toUpperCase()}</div>
        `;
        // Approval button handlers
        slot.querySelector('.abtn-approve').onclick = (e) => { e.stopPropagation(); doAction(s.id, 'approve'); };
        slot.querySelector('.abtn-deny').onclick    = (e) => { e.stopPropagation(); doAction(s.id, 'deny'); };
        // Tap (not drag) on mascot figure toggles log
        // WKWebView: drag region swallows click events, so detect via mousedown/mouseup distance
        let mdX = 0, mdY = 0;
        const fig = slot.querySelector('.mascot-figure');
        fig.addEventListener('mousedown', (e) => { mdX = e.clientX; mdY = e.clientY; });
        fig.addEventListener('mouseup',   (e) => {
          const dist = Math.hypot(e.clientX - mdX, e.clientY - mdY);
          if (dist < 6) toggleLog(s.id, slot);
        });
        area.appendChild(slot);
      }
      return slot;
    }

    function updateSlot(slot, s) {
      // Status classes
      const sc = statusClass(s.status);
      const wasHidden = slot.classList.contains('hidden');
      slot.className = `mascot-slot ${sc}${wasHidden ? ' hidden' : ''}`;

      // Name label
      slot.querySelector('.mascot-label').textContent = (s.name || s.id).toUpperCase();

      // Popover header
      slot.querySelector('.popover-title').textContent = (s.name || s.id).toUpperCase();
      const taskEl = slot.querySelector('.popover-task');
      taskEl.textContent = (s.status !== 'idle' && s.task) ? s.task : '';

      // Auto-hide logic
      if (s.status === 'idle') {
        scheduleHide(s.id, s.timestamp || Date.now());
      } else {
        showSlot(s.id);
      }

      // If log is open, refresh its feed
      if (openLog === s.id) renderLogFeed();
    }

    function statusClass(st) {
      return { idle:'s-idle', thinking:'s-thinking', working:'s-working',
               needs_approval:'s-approval', success:'s-success',
               error:'s-error', warning:'s-warning' }[st] || 's-idle';
    }

    // ── Log popover (single shared, fixed-positioned) ─────────────────────
    function toggleLog(id, slot) {
      if (openLog === id) {
        closeLog();
        return;
      }
      if (openLog) closeLog();
      openLog = id;

      const popover = document.getElementById('log-popover');
      // Position above the mascot figure
      const fig = slot.querySelector('.mascot-figure');
      const rect = fig.getBoundingClientRect();
      const pw = 260;
      const margin = 10;

      // Horizontal: center on mascot, clamp to viewport
      let left = rect.left + rect.width / 2 - pw / 2;
      left = Math.max(margin, Math.min(left, window.innerWidth - pw - margin));

      // Vertical: above the mascot
      let bottom = window.innerHeight - rect.top + 8;

      popover.style.left   = left + 'px';
      popover.style.bottom = bottom + 'px';
      popover.style.top    = 'auto';
      popover.style.transformOrigin = 'bottom center';

      // If popover would go above viewport, flip below
      const popoverHeight = 280;
      if (rect.top - popoverHeight - 8 < 0) {
        popover.style.bottom = 'auto';
        popover.style.top    = (rect.bottom + 8) + 'px';
        popover.style.transformOrigin = 'top center';
      }

      // Update header
      const s = sessions[id] || {};
      popover.querySelector('.popover-title').textContent = (s.name || id).toUpperCase();
      popover.querySelector('.popover-task').textContent  = (s.status !== 'idle' && s.task) ? s.task : '';

      renderLogFeed();
      popover.classList.add('open');
    }

    function closeLog() {
      document.getElementById('log-popover').classList.remove('open');
      openLog = null;
    }

    function renderLogFeed() {
      const feed = document.getElementById('log-feed');
      const entries = history.slice(-40).reverse();
      if (!entries.length) {
        feed.innerHTML = '<div class="log-empty">No activity yet</div>';
        return;
      }
      feed.innerHTML = '';
      entries.forEach(h => {
        const row = document.createElement('div');
        row.className = `log-row ls-${h.status}`;
        row.innerHTML = `
          <div class="log-dot"></div>
          <div class="log-text"><strong>${h.name || h.id}</strong> ${h.task || ''}</div>
          <div class="log-time">${h.time || ''}</div>
        `;
        feed.appendChild(row);
      });
    }

    // ── Auto-hide ─────────────────────────────────────────────────────────
    function scheduleHide(id, timestamp) {
      if (hideTimers[id]) clearTimeout(hideTimers[id]);
      const remaining = IDLE_TIMEOUT - (Date.now() - timestamp);
      if (remaining <= 0) {
        hideSlot(id);
      } else {
        hideTimers[id] = setTimeout(() => hideSlot(id), remaining);
      }
    }

    function hideSlot(id) {
      const slot = document.querySelector(`[data-id="${id}"]`);
      if (slot) slot.classList.add('hidden');
      if (openLog === id) closeLog();
    }

    function showSlot(id) {
      if (hideTimers[id]) clearTimeout(hideTimers[id]);
      const slot = document.querySelector(`[data-id="${id}"]`);
      if (slot) slot.classList.remove('hidden');
    }

    // ── Render all sessions ───────────────────────────────────────────────
    function renderSessions(newSessions) {
      const area = document.getElementById('mascots-area');
      const ids  = new Set(Object.keys(newSessions));

      // Remove gone sessions
      area.querySelectorAll('[data-id]').forEach(el => {
        if (!ids.has(el.dataset.id)) el.remove();
      });

      Object.values(newSessions).forEach(s => {
        const slot = getOrCreateSlot(s);
        updateSlot(slot, s);
      });
    }

    // ── SSE ───────────────────────────────────────────────────────────────
    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('http://localhost:49152/stream');
      eventSource.addEventListener('update', e => {
        try {
          const data = JSON.parse(e.data);
          sessions = data.sessions || {};
          history  = data.history  || [];
          renderSessions(sessions);
        } catch(_) {}
      });
      eventSource.onerror = () => {
        eventSource.close();
        setTimeout(connectSSE, 5000);
      };
    }

    async function doAction(id, type) {
      await fetch('http://localhost:49152/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action: type })
      });
    }

    // Close log when clicking outside mascot and popover
    document.addEventListener('click', (e) => {
      if (!openLog) return;
      const slot    = document.querySelector(`[data-id="${openLog}"]`);
      const popover = document.getElementById('log-popover');
      if (!e.target.closest(`[data-id="${openLog}"]`) && !e.target.closest('#log-popover')) {
        closeLog();
      }
    });

    connectSSE();
  </script>
</body>
</html>
