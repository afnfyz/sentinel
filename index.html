<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* Each mascot slot is positioned absolutely at the bottom of the window */
    .mascot-slot {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      overflow: visible;
    }

    /* ===== PIGEON — always at the same spot ===== */
    .mascot-figure {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
      z-index: 1;
    }
    .mascot-svg {
      width: 100px;
      height: 100px;
      image-rendering: pixelated;
    }

    .agent-name {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--name-color, rgba(255,255,255,0.4));
      text-align: center;
      margin-top: 4px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ===== THOUGHT BUBBLE — floats above pigeon via absolute pos ===== */
    .thought-bubble {
      display: none;
      position: absolute;
      bottom: 115px;          /* sits above the pigeon */
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 230px;
      z-index: 10;
    }
    .s-needs_approval .thought-bubble { display: block; }

    .cloud-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .cloud-content {
      position: absolute;
      top: 10%; left: 16%; right: 12%;
      bottom: 20%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 12;
    }

    /* "ALLOW ACCESS?" SVG text */
    .bubble-title {
      width: 78%;
      pointer-events: none;
    }

    /* parchment text strip */
    .task-strip {
      position: relative;
      width: 94%;
      min-height: 36px;
    }
    .task-strip > img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: fill;
      pointer-events: none;
    }
    .task-strip-text {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 7.5px;
      color: #333;
      text-align: center;
      padding: 8px 12px;
      line-height: 1.4;
      overflow: hidden;
      word-break: break-all;
      white-space: normal;
    }

    /* DENY / ALLOW buttons */
    .approval-btns {
      display: none;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }
    .s-needs_approval .approval-btns { display: flex; }

    .abtn {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: transform 80ms;
      user-select: none;
      pointer-events: auto;
    }
    .abtn:active { transform: scale(0.88); }
    .abtn img {
      height: 28px;
      pointer-events: none;
    }

    /* ===== ANIMATION ANCHORS ===== */
    .p-head-unit { transform-origin: 45px 35px; }
    .p-body-group { transform-origin: 40px 60px; }
  </style>
</head>
<body>
  <div id="mascots-area"></div>

  <script>
    const VISOR_COLORS = {
      idle:           '#72d6ff',
      thinking:       '#7830DC',
      working:        '#F5A623',
      needs_approval: '#D71921',
      success:        '#2FDFB0',
      error:          '#FF4455',
      warning:        '#FFB830'
    };

    function buildPigeonSVG() {
      return `<svg class="mascot-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
        <g id="p-tail">
          <path d="M12 44h8v6h-8z" fill="#373D4D"/>
          <path d="M10 48h10v4h-10z" fill="#1C1C21"/>
        </g>
        <g id="p-legs">
          <path d="M34 54h2v4h-2zM42 54h2v4h-2z" fill="#A86E79"/>
          <path d="M32 58h6v2h-6zM40 58h6v2h-6z" fill="#1C1C21"/>
        </g>
        <g class="p-body-group">
          <path d="M28 32h20v24H28z" fill="#1C1C21"/>
          <path d="M30 34h16v20H30z" fill="#7A8296"/>
          <path d="M30 48h16v6H30z" fill="#5D647A"/>
          <path d="M32 34h4v4h-4zM38 34h4v4h-4z" fill="#98A0B3"/>
          <g id="p-wing">
            <path d="M22 38h18v16h-18z" fill="#1C1C21"/>
            <path d="M24 40h14v12H24z" fill="#98A0B3"/>
            <path d="M24 46h14v2H24z" fill="#4A5166"/>
            <path d="M24 50h12v2H24z" fill="#373D4D"/>
          </g>
        </g>
        <g class="p-head-unit">
          <path d="M38 24h12v10H38z" fill="#1C1C21"/>
          <path d="M40 26h8v6H40z" fill="#7A8296"/>
          <path d="M40 27h8v2H40z" fill="#7EA8A6" opacity="0.6"/>
          <path d="M42 10h16v16H42z" fill="#1C1C21"/>
          <path d="M44 12h12v12H44z" fill="#7A8296"/>
          <path d="M44 12h6v6h-6z" fill="#98A0B3"/>
          <rect x="52" y="16" width="2" height="2" fill="#1C1C21"/>
          <rect x="53" y="16" width="1" height="1" fill="#fff"/>
          <g id="p-visor-group">
            <rect x="50" y="14" width="10" height="8" fill="#1C1C21"/>
            <rect class="mascot-visor" x="51" y="15" width="8" height="6" fill="#72d6ff"/>
            <rect x="52" y="15" width="4" height="2" fill="#B4E8FF" opacity="0.8"/>
          </g>
          <path d="M58 20h6v4h-6z" fill="#1C1C21"/>
          <path d="M58 20h4v2h-4z" fill="#3B3B45"/>
        </g>
      </svg>`;
    }

    function getOrCreateSlot(s) {
      const area = document.getElementById('mascots-area');
      let slot = area.querySelector(`[data-id="${s.id}"]`);
      if (!slot) {
        slot = document.createElement('div');
        slot.className = `mascot-slot s-${s.status}`;
        slot.dataset.id = s.id;
        slot.innerHTML = `
          <div class="thought-bubble">
            <img class="cloud-bg" src="cloud-bubble.svg" alt="">
            <div class="cloud-content">
              <img class="bubble-title" src="text-allow-access.svg" alt="ALLOW ACCESS?">
              <div class="task-strip">
                <img src="text-strip.svg" alt="">
                <div class="task-strip-text">${s.task || ''}</div>
              </div>
              <div class="approval-btns">
                <button class="abtn abtn-deny"><img src="btn-deny.svg" alt="DENY"></button>
                <button class="abtn abtn-allow"><img src="btn-allow.svg" alt="ALLOW"></button>
              </div>
            </div>
          </div>
          <div class="mascot-figure">${buildPigeonSVG()}</div>
          <div class="agent-name">${s.name || s.id}</div>
        `;
        slot.querySelector('.abtn-deny').addEventListener('click', () => sendAction(s.id, 'deny'));
        slot.querySelector('.abtn-allow').addEventListener('click', () => sendAction(s.id, 'approve'));
        startAnimations(slot);
        area.appendChild(slot);
      }
      return slot;
    }

    function sendAction(id, action) {
      fetch('/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action })
      }).catch(err => console.error('[Sentinel] action failed:', err));
    }

    function updateSlot(slot, s) {
      slot.className = `mascot-slot s-${s.status}`;
      const visor = slot.querySelector('.mascot-visor');
      if (visor) visor.setAttribute('fill', VISOR_COLORS[s.status] || VISOR_COLORS.idle);
      const taskText = slot.querySelector('.task-strip-text');
      if (taskText) taskText.textContent = s.task || '';
      const agentName = slot.querySelector('.agent-name');
      if (agentName) agentName.textContent = s.name || s.id;
      handleStateSync(slot, s.status);
    }

    function handleStateSync(slot, status) {
      const head = slot.querySelector('.p-head-unit');
      head.getAnimations().forEach(a => { if(a.id !== 'idle') a.cancel() });

      if (status === 'thinking') {
        // Gentle pulse — distinct from working bob, signals model is processing
        const think = head.animate([
          { transform: 'rotate(0) scale(1)' },
          { transform: 'rotate(-2deg) scale(1.02)', offset: 0.5 },
          { transform: 'rotate(0) scale(1)' }
        ], { duration: 1200, iterations: Infinity, easing: 'ease-in-out' });
        think.id = 'active-anim';
      } else if (status === 'working' || status === 'needs_approval') {
        const speed = status === 'needs_approval' ? 400 : 700;
        const bob = head.animate([
          { transform: 'translateY(0) rotate(0deg)' },
          { transform: `translateY(${status === 'needs_approval' ? '5px' : '3px'}) rotate(2deg)`, offset: 0.5 },
          { transform: 'translateY(0) rotate(0deg)' }
        ], { duration: speed, iterations: Infinity, easing: 'ease-in-out' });
        bob.id = 'active-anim';
      }
    }

    function startAnimations(slot) {
      const body = slot.querySelector('.p-body-group');
      const head = slot.querySelector('.p-head-unit');
      body.animate([
        { transform: 'scaleY(1)' },
        { transform: 'scaleY(0.97)', offset: 0.5 },
        { transform: 'scaleY(1)' }
      ], { duration: 3000, iterations: Infinity, easing: 'ease-in-out' });
      const idleMood = () => {
        setTimeout(() => {
          if (!head.getAnimations().some(a => a.id === 'active-anim')) {
            head.animate([
              { transform: 'rotate(0)' },
              { transform: 'rotate(-5deg)', offset: 0.5 },
              { transform: 'rotate(0)' }
            ], { duration: 1500, easing: 'ease-in-out' });
          }
          idleMood();
        }, 4000 + Math.random() * 5000);
      };
      idleMood();
    }

    function renderSessions(sessions) {
      const all = Object.values(sessions);
      const hasNonMain = all.some(s => s.id !== 'main');
      all.forEach(s => {
        if (s.id === 'main' && hasNonMain) {
          const existing = document.querySelector(`[data-id="${s.id}"]`);
          if (existing) existing.remove();
          return;
        }
        const slot = getOrCreateSlot(s);
        updateSlot(slot, s);
      });
      document.querySelectorAll('#mascots-area [data-id]').forEach(slot => {
        if (!sessions[slot.dataset.id]) slot.remove();
      });
      // Notify Swift layer about approval state (eliminates 3s polling timer)
      const anyApproval = all.some(s => s.status === 'needs_approval');
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.sentinel) {
        window.webkit.messageHandlers.sentinel.postMessage({ needsApproval: anyApproval });
      }
    }

    // --- Connection strategy ---
    // SSE for real-time updates + polling fallback every 2s.
    // WKWebView's EventSource can silently die on file:// origins,
    // so the poll ensures the UI always reflects current state.

    let evtSource;
    let sseAlive = false;

    function connectSSE() {
      if (evtSource) { try { evtSource.close(); } catch(e) {} }
      sseAlive = false;
      evtSource = new EventSource('/stream');
      evtSource.addEventListener('update', e => {
        sseAlive = true;
        const data = JSON.parse(e.data);
        renderSessions(data.sessions || {});
      });
      evtSource.onerror = () => {
        console.warn('[Sentinel] SSE error — polling will cover until reconnect');
        sseAlive = false;
      };
    }
    connectSSE();

    // Polling fallback — always runs, ensures UI never goes stale
    setInterval(() => {
      fetch('/state')
        .then(r => r.json())
        .then(data => renderSessions(data.sessions || {}))
        .catch(() => {});
      // If SSE has been dead for a while, force reconnect
      if (!sseAlive && evtSource && evtSource.readyState === EventSource.CLOSED) {
        connectSSE();
      }
    }, 2000);
  </script>
</body>
</html>
