<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel</title>
  <style>
    :root {
      --bg: rgba(18, 18, 18, 0.98);
      --card: rgba(45, 45, 45, 0.6);
      --idle: #3498db; --thinking: #9b59b6; --working: #f1c40f; --warning: #e74c3c; --success: #2ecc71;
    }

    body {
      margin: 0; padding: 15px;
      font-family: -apple-system, sans-serif;
      display: flex; justify-content: center; align-items: flex-start;
      height: 100vh; background: transparent; overflow: hidden;
    }

    #sentinel-panel {
      background: var(--bg);
      backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 15px;
      display: flex; gap: 0;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      align-items: flex-start;
    }

    #agents-area {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start;
    }

    .agent-card {
      background: var(--card);
      border-radius: 20px;
      padding: 14px 14px 12px;
      width: 160px;
      display: flex; flex-direction: column; align-items: center;
      border: 1px solid rgba(255,255,255,0.05);
      box-sizing: border-box;
    }

    /* Pulse border on approval */
    .status-needs_approval.agent-card {
      border-color: var(--warning);
      box-shadow: 0 0 0 0 rgba(231,76,60,0.6);
      animation: border-pulse 1s infinite;
    }

    @keyframes border-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
      100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
    }

    .mascot {
      width: 44px; height: 44px; border-radius: 13px;
      margin-bottom: 10px; background: var(--idle);
      position: relative; flex-shrink: 0;
    }
    .mascot::before, .mascot::after {
      content: ''; width: 5px; height: 5px; background: rgba(0,0,0,0.7);
      border-radius: 50%; position: absolute; top: 11px;
    }
    .mascot::before { left: 12px; } .mascot::after { right: 12px; }

    .name {
      font-size: 9px; text-transform: uppercase; color: #777;
      font-weight: 900; letter-spacing: 1.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      width: 100%; text-align: center;
    }

    .task {
      font-size: 11px; color: #ddd; text-align: center;
      margin-top: 7px; line-height: 1.4;
      word-break: break-word; width: 100%;
      min-height: 30px;
    }

    /* History toggle */
    #toggle-history {
      background: rgba(255,255,255,0.08);
      border: none; color: #555; width: 28px; height: 28px;
      border-radius: 50%; cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-size: 13px;
      margin-left: 8px; flex-shrink: 0; align-self: center;
      transition: 0.2s;
    }
    #toggle-history:hover { background: rgba(255,255,255,0.18); color: #fff; }

    /* Log panel — animated with max-width so transition works */
    #log-panel {
      display: flex;
      flex-direction: column;
      max-width: 0; overflow: hidden;
      opacity: 0; visibility: hidden;
      transition: max-width 0.35s ease, opacity 0.3s ease, padding-left 0.35s ease;
      padding-left: 0;
      border-left: 1px solid transparent;
    }
    #sentinel-panel.show-history #log-panel {
      max-width: 320px; opacity: 1; visibility: visible;
      padding-left: 18px;
      border-left-color: rgba(255,255,255,0.1);
    }

    #log-panel h3 {
      font-size: 9px; text-transform: uppercase; color: #444;
      margin: 0 0 10px 0; letter-spacing: 2px; white-space: nowrap;
    }

    #log-feed {
      overflow-y: auto; max-height: 280px;
      display: flex; flex-direction: column; gap: 6px;
      width: 280px;
    }

    .log-entry {
      font-size: 10px; line-height: 1.4; color: #888;
      padding: 5px 0 5px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      border-left: 2px solid transparent;
      animation: slideIn 0.25s ease-out;
    }
    .log-entry strong { color: #bbb; }
    .log-entry .time { color: #3a3a3a; font-size: 9px; float: right; margin-left: 6px; }

    .log-entry.status-success       { border-left-color: var(--success); }
    .log-entry.status-error,
    .log-entry.status-warning,
    .log-entry.status-needs_approval { border-left-color: var(--warning); }
    .log-entry.status-thinking       { border-left-color: var(--thinking); }
    .log-entry.status-working        { border-left-color: var(--working); }

    /* Mascot status animations */
    .status-idle .mascot            { background: var(--idle); animation: breathe 3s infinite ease-in-out; }
    .status-thinking .mascot        { background: var(--thinking); box-shadow: 0 0 18px var(--thinking); animation: pulse 2s infinite; }
    .status-working .mascot         { background: var(--working); box-shadow: 0 0 18px var(--working); animation: pulse 1s infinite; }
    .status-needs_approval .mascot  { background: var(--warning); box-shadow: 0 0 24px var(--warning); animation: shake 0.15s infinite; }
    .status-success .mascot         { background: var(--success); box-shadow: 0 0 14px var(--success); animation: pop 0.4s ease-out; }
    .status-error .mascot,
    .status-warning .mascot         { background: var(--warning); }

    @keyframes pulse   { 0%,100% { transform: scale(1); }    50% { transform: scale(1.08); } }
    @keyframes shake   { 0%,100% { transform: rotate(0); }   25% { transform: rotate(4deg); } 75% { transform: rotate(-4deg); } }
    @keyframes breathe { 0%,100% { transform: scale(1); opacity:0.85; } 50% { transform: scale(1.04); opacity:1; } }
    @keyframes pop     { 0% { transform: scale(0.9); } 60% { transform: scale(1.12); } 100% { transform: scale(1); } }
    @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }

    /* Approval controls */
    .controls { display: none; gap: 6px; margin-top: 10px; width: 100%; }
    .status-needs_approval .controls { display: flex; }
    .btn-action {
      flex: 1; font-size: 10px; padding: 7px 4px;
      border: none; border-radius: 8px; color: #fff;
      cursor: pointer; font-weight: 800; letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-action:hover  { opacity: 0.85; }
    .btn-action:active { transform: scale(0.96); }
    .approve { background: var(--success); }
    .deny    { background: var(--warning); }
  </style>
</head>
<body>
  <div id="sentinel-panel">
    <div id="agents-area"></div>
    <button id="toggle-history" title="Toggle log" onclick="toggleHistory()">📋</button>
    <div id="log-panel">
      <h3>Activity Log</h3>
      <div id="log-feed"></div>
    </div>
  </div>

  <script>
    let lastHistory = '';
    let lastSessions = '';
    let eventSource = null;

    function toggleHistory() {
      document.getElementById('sentinel-panel').classList.toggle('show-history');
    }

    function updateAgentCard(session) {
      const agentsArea = document.getElementById('agents-area');
      let card = agentsArea.querySelector(`.agent-card[data-session-id="${session.id}"]`);

      if (!card) {
        card = document.createElement('div');
        card.dataset.sessionId = session.id;

        const name = document.createElement('div');
        name.className = 'name';

        const mascot = document.createElement('div');
        mascot.className = 'mascot';

        const task = document.createElement('div');
        task.className = 'task';

        const controls = document.createElement('div');
        controls.className = 'controls';

        const approve = document.createElement('button');
        approve.className = 'btn-action approve';
        approve.textContent = 'Approve';
        approve.onclick = () => action(session.id, 'approve');

        const deny = document.createElement('button');
        deny.className = 'btn-action deny';
        deny.textContent = 'Deny';
        deny.onclick = () => action(session.id, 'deny');

        controls.appendChild(approve);
        controls.appendChild(deny);
        card.appendChild(name);
        card.appendChild(mascot);
        card.appendChild(task);
        card.appendChild(controls);
        card.className = `agent-card status-${session.status}`;
        agentsArea.appendChild(card);
      }

      card.className = `agent-card status-${session.status}`;
      card.querySelector('.name').textContent = session.name || session.id;
      card.querySelector('.task').textContent = session.task;
    }

    function renderSessions(sessions) {
      const agentsArea = document.getElementById('agents-area');
      const ids = new Set(Object.keys(sessions));
      agentsArea.querySelectorAll('.agent-card').forEach(c => {
        if (!ids.has(c.dataset.sessionId)) c.remove();
      });
      Object.values(sessions).forEach(updateAgentCard);
    }

    function renderHistory(history) {
      const feed = document.getElementById('log-feed');
      feed.innerHTML = '';
      history.forEach(h => {
        const entry = document.createElement('div');
        entry.className = `log-entry status-${h.status}`;
        const time = document.createElement('span');
        time.className = 'time';
        time.textContent = h.time;
        const strong = document.createElement('strong');
        strong.textContent = h.name + ' ';
        entry.appendChild(time);
        entry.appendChild(strong);
        entry.appendChild(document.createTextNode(h.task));
        feed.appendChild(entry);
      });
    }

    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('http://localhost:49152/stream');

      eventSource.addEventListener('update', (event) => {
        try {
          const { sessions, history } = JSON.parse(event.data);
          const sStr = JSON.stringify(sessions);
          const hStr = JSON.stringify(history);
          if (sStr !== lastSessions) { lastSessions = sStr; renderSessions(sessions); }
          if (hStr !== lastHistory)  { lastHistory  = hStr; renderHistory(history); }
          document.body.classList.remove('disconnected');
        } catch(e) {}
      });

      eventSource.onerror = () => {
        document.body.classList.add('disconnected');
        eventSource.close();
        setTimeout(connectSSE, 5000);
      };
    }

    async function action(id, type) {
      await fetch('http://localhost:49152/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action: type })
      });
    }

    connectSSE();
  </script>
</body>
</html>
