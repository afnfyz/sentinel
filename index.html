<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --black:           #000000;
      --surface:         #111111;
      --surface-raised:  #1A1A1A;
      --border:          #222222;
      --border-visible:  #333333;
      --text-disabled:   #666666;
      --text-secondary:  #999999;
      --text-primary:    #E8E8E8;
      --text-display:    #FFFFFF;
      --accent:          #D71921;
      --success:         #4A9E5C;
      --warning:         #D4A843;
      --info:            #5B9BF6;

      --idle-color:     var(--info);
      --think-color:    #9B7FD4;
      --work-color:     var(--warning);
      --approval-color: var(--accent);
      --success-color:  var(--success);

      /* Auto-hide after 2 minutes of no activity */
      --idle-timeout-ms: 120000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      /* Allow dragging from anywhere not interactive */
      -webkit-app-region: drag;
    }

    button, a { -webkit-app-region: no-drag; }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 10px;
    }

    /* ── Panel ── */
    #panel {
      background: var(--black);
      border: 1px solid var(--border-visible);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      min-width: 160px;
      overflow: hidden;
    }

    /* ── Panel header bar ── */
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    #panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-disabled);
    }

    #log-toggle {
      -webkit-app-region: no-drag;
      background: none;
      border: 1px solid var(--border-visible);
      border-radius: 4px;
      color: var(--text-disabled);
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 7px;
      cursor: pointer;
      transition: border-color 150ms ease-out, color 150ms ease-out;
    }
    #log-toggle:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
    #log-toggle.active { border-color: var(--text-primary); color: var(--text-primary); }

    /* ── Body: cards + log ── */
    #panel-body {
      display: flex;
      align-items: stretch;
    }

    /* ── Agents ── */
    #agents-area {
      display: flex;
      flex-direction: row;
      gap: 0;
    }

    /* Agent wrapper — handles show/hide */
    .agent-wrap {
      opacity: 1;
      max-width: 200px;
      overflow: hidden;
      transition: opacity 400ms ease-out, max-width 400ms ease-out;
    }
    .agent-wrap.hidden {
      opacity: 0;
      max-width: 0;
    }

    /* ── Agent Card ── */
    .agent-card {
      width: 156px;
      padding: 14px 14px 12px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-app-region: no-drag;
      position: relative;
    }

    /* Top row: dot + name */
    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-disabled);
      transition: background 300ms ease-out, box-shadow 300ms ease-out;
    }

    .agent-name {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Status label */
    .status-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-disabled);
      transition: color 300ms ease-out;
    }

    /* Task text */
    .task-text {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.45;
      word-break: break-word;
      min-height: 17px;
    }

    /* ── Dot colors per status ── */
    .s-idle     .status-dot { background: var(--idle-color);     box-shadow: 0 0 6px var(--idle-color); }
    .s-thinking .status-dot { background: var(--think-color);    box-shadow: 0 0 6px var(--think-color); animation: blink 1.4s ease-in-out infinite; }
    .s-working  .status-dot { background: var(--work-color);     box-shadow: 0 0 6px var(--work-color);  animation: blink 0.7s ease-in-out infinite; }
    .s-approval .status-dot { background: var(--approval-color); box-shadow: 0 0 8px var(--approval-color); animation: blink 0.35s ease-in-out infinite; }
    .s-success  .status-dot { background: var(--success-color);  box-shadow: 0 0 8px var(--success-color); }
    .s-error    .status-dot,
    .s-warning  .status-dot { background: var(--warning);        box-shadow: 0 0 6px var(--warning); }

    .s-idle     .status-label { color: var(--idle-color); }
    .s-thinking .status-label { color: var(--think-color); }
    .s-working  .status-label { color: var(--work-color); }
    .s-approval .status-label { color: var(--approval-color); }
    .s-success  .status-label { color: var(--success-color); }
    .s-error    .status-label,
    .s-warning  .status-label { color: var(--warning); }

    /* Approval card left border */
    .s-approval .agent-card {
      border-left: 2px solid var(--approval-color);
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Approval controls ── */
    .controls {
      display: none;
      gap: 6px;
    }
    .s-approval .controls { display: flex; }

    .btn {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 0;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 150ms ease-out;
      -webkit-app-region: no-drag;
    }
    .btn:hover { opacity: 0.75; }
    .btn:active { opacity: 0.55; }
    .btn-approve {
      background: transparent;
      border: 1px solid var(--success);
      color: var(--success);
    }
    .btn-deny {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    /* ── Log panel ── */
    #log-panel {
      display: flex;
      flex-direction: column;
      max-width: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-width 300ms ease-out, opacity 250ms ease-out;
    }
    #log-panel.open {
      max-width: 280px;
      opacity: 1;
    }

    #log-inner {
      width: 260px;
      padding: 12px;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-header {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-disabled);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    #log-feed {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #log-feed::-webkit-scrollbar { width: 2px; }
    #log-feed::-webkit-scrollbar-track { background: transparent; }
    #log-feed::-webkit-scrollbar-thumb { background: var(--border-visible); }

    .log-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-row:last-child { border-bottom: none; }

    .log-indicator {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
      background: var(--text-disabled);
    }
    .log-row.ls-success  .log-indicator { background: var(--success); }
    .log-row.ls-working  .log-indicator { background: var(--warning); }
    .log-row.ls-thinking .log-indicator { background: var(--think-color); }
    .log-row.ls-needs_approval .log-indicator { background: var(--accent); }
    .log-row.ls-error,
    .log-row.ls-warning  .log-indicator { background: var(--accent); }

    .log-text {
      flex: 1;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .log-text strong { color: var(--text-primary); font-weight: 500; }

    .log-time {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--text-disabled);
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="panel">
    <div id="panel-header">
      <span id="panel-title">Sentinel</span>
      <button id="log-toggle" onclick="toggleLog()">Log</button>
    </div>
    <div id="panel-body">
      <div id="agents-area"></div>
      <div id="log-panel">
        <div id="log-inner">
          <div class="log-header">Activity</div>
          <div id="log-feed"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const IDLE_TIMEOUT = 120000; // 2 minutes

    let lastSessions = '';
    let lastHistory  = '';
    let eventSource  = null;
    let hideTimers   = {};

    function toggleLog() {
      const panel = document.getElementById('log-panel');
      const btn   = document.getElementById('log-toggle');
      const open  = panel.classList.toggle('open');
      btn.classList.toggle('active', open);
    }

    function statusClass(status) {
      const map = {
        idle:           's-idle',
        thinking:       's-thinking',
        working:        's-working',
        needs_approval: 's-approval',
        success:        's-success',
        error:          's-error',
        warning:        's-warning',
      };
      return map[status] || 's-idle';
    }

    function statusLabel(status) {
      const map = {
        idle:           'Ready',
        thinking:       'Thinking',
        working:        'Working',
        needs_approval: 'Approval',
        success:        'Done',
        error:          'Error',
        warning:        'Warning',
      };
      return map[status] || status;
    }

    function scheduleHide(id, timestamp) {
      if (hideTimers[id]) clearTimeout(hideTimers[id]);
      const age = Date.now() - timestamp;
      const remaining = IDLE_TIMEOUT - age;
      if (remaining <= 0) {
        hideCard(id);
      } else {
        hideTimers[id] = setTimeout(() => hideCard(id), remaining);
      }
    }

    function hideCard(id) {
      const wrap = document.querySelector(`[data-session-id="${id}"]`);
      if (wrap) wrap.classList.add('hidden');
    }

    function showCard(id) {
      if (hideTimers[id]) clearTimeout(hideTimers[id]);
      const wrap = document.querySelector(`[data-session-id="${id}"]`);
      if (wrap) wrap.classList.remove('hidden');
    }

    function makeCard(s) {
      const wrap = document.createElement('div');
      wrap.className = 'agent-wrap';
      wrap.dataset.sessionId = s.id;

      const card = document.createElement('div');
      card.className = 'agent-card';

      // Top: dot + name
      const top = document.createElement('div');
      top.className = 'card-top';
      const dot = document.createElement('div');
      dot.className = 'status-dot';
      const name = document.createElement('div');
      name.className = 'agent-name';
      top.appendChild(dot);
      top.appendChild(name);

      // Status label
      const label = document.createElement('div');
      label.className = 'status-label';

      // Task
      const task = document.createElement('div');
      task.className = 'task-text';

      // Controls
      const controls = document.createElement('div');
      controls.className = 'controls';
      const approve = document.createElement('button');
      approve.className = 'btn btn-approve';
      approve.textContent = 'Approve';
      approve.onclick = () => action(s.id, 'approve');
      const deny = document.createElement('button');
      deny.className = 'btn btn-deny';
      deny.textContent = 'Deny';
      deny.onclick = () => action(s.id, 'deny');
      controls.appendChild(approve);
      controls.appendChild(deny);

      card.appendChild(top);
      card.appendChild(label);
      card.appendChild(task);
      card.appendChild(controls);
      wrap.appendChild(card);
      return wrap;
    }

    function renderSessions(sessions) {
      const area = document.getElementById('agents-area');
      const ids  = new Set(Object.keys(sessions));

      area.querySelectorAll('[data-session-id]').forEach(el => {
        if (!ids.has(el.dataset.sessionId)) el.remove();
      });

      Object.values(sessions).forEach(s => {
        let wrap = area.querySelector(`[data-session-id="${s.id}"]`);
        if (!wrap) {
          wrap = makeCard(s);
          area.appendChild(wrap);
        }

        // Update class
        wrap.className = `agent-wrap ${statusClass(s.status)}`;

        // Update content
        wrap.querySelector('.agent-name').textContent  = s.name || s.id;
        wrap.querySelector('.status-label').textContent = statusLabel(s.status);
        wrap.querySelector('.task-text').textContent    = s.status === 'idle' ? '' : s.task;

        // Show card on any activity, then re-schedule hide from idle
        if (s.status === 'idle') {
          // Start hide timer from last activity
          scheduleHide(s.id, s.timestamp || Date.now());
        } else {
          // Active — always visible, cancel any pending hide
          showCard(s.id);
        }
      });
    }

    function renderHistory(history) {
      const feed = document.getElementById('log-feed');
      feed.innerHTML = '';
      history.forEach(h => {
        const row = document.createElement('div');
        row.className = `log-row ls-${h.status}`;

        const ind = document.createElement('div');
        ind.className = 'log-indicator';

        const text = document.createElement('div');
        text.className = 'log-text';
        const strong = document.createElement('strong');
        strong.textContent = (h.name || h.id) + ' ';
        text.appendChild(strong);
        text.appendChild(document.createTextNode(h.task));

        const time = document.createElement('div');
        time.className = 'log-time';
        time.textContent = h.time;

        row.appendChild(ind);
        row.appendChild(text);
        row.appendChild(time);
        feed.appendChild(row);
      });
    }

    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('http://localhost:49152/stream');
      eventSource.addEventListener('update', e => {
        try {
          const { sessions, history } = JSON.parse(e.data);
          const ss = JSON.stringify(sessions);
          const hs = JSON.stringify(history);
          if (ss !== lastSessions) { lastSessions = ss; renderSessions(sessions); }
          if (hs !== lastHistory)  { lastHistory  = hs; renderHistory(history); }
        } catch(_) {}
      });
      eventSource.onerror = () => {
        eventSource.close();
        setTimeout(connectSSE, 5000);
      };
    }

    async function action(id, type) {
      await fetch('http://localhost:49152/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action: type })
      });
    }

    connectSSE();
  </script>
</body>
</html>
