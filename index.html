<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&family=Doto:wght@100..900&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ── */
    :root {
      --black:           #000000;
      --surface:         #0D0D0D;
      --surface-raised:  #161616;
      --border:          #1E1E1E;
      --border-visible:  #2E2E2E;
      --text-disabled:   #555555;
      --text-secondary:  #888888;
      --text-primary:    #E0E0E0;
      --text-display:    #FFFFFF;
      --accent:          #D71921;
      --success:         #4A9E5C;
      --warning:         #D4A843;
      --info:            #5B9BF6;
      --purple:          #9B7FD4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    button, a { -webkit-app-region: no-drag; }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 12px;
    }

    /* ── Outer panel ── */
    #panel {
      background: var(--black);
      border: 1px solid var(--border-visible);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: visible;
      min-width: 100px;
    }

    /* ── Agent cards row ── */
    #agents-area {
      display: flex;
      flex-direction: row;
      align-items: stretch;
    }

    /* ── Agent wrapper — handles show/hide animation ── */
    .agent-wrap {
      opacity: 1;
      max-width: 220px;
      overflow: hidden;
      transition: opacity 500ms cubic-bezier(0.25,0.1,0.25,1),
                  max-width 500ms cubic-bezier(0.25,0.1,0.25,1);
    }
    .agent-wrap.hidden {
      opacity: 0;
      max-width: 0;
    }

    /* ── Agent Card ── */
    .agent-card {
      width: 180px;
      padding: 18px 16px 14px;
      border-right: 1px solid var(--border-visible);
      display: flex;
      flex-direction: column;
      gap: 0;
      -webkit-app-region: no-drag;
      position: relative;
    }
    /* Remove right border from last visible card */
    .agent-wrap:last-child .agent-card,
    .agent-wrap.last-visible .agent-card {
      border-right: none;
    }

    /* ── Mascot area ── */
    .mascot-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .mascot-glyph {
      font-size: 32px;
      line-height: 1;
      /* No emoji, use Doto dot-matrix letter as mascot */
      font-family: 'Doto', monospace;
      font-weight: 700;
      color: var(--text-display);
      letter-spacing: -0.04em;
      transition: color 300ms ease-out;
    }

    .status-pip-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .status-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-disabled);
      transition: background 300ms ease-out, box-shadow 300ms ease-out;
    }

    /* ── Name ── */
    .agent-name {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Status label ── */
    .status-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-disabled);
      margin-bottom: 10px;
      transition: color 300ms ease-out;
    }

    /* ── Task text ── */
    .task-text {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      word-break: break-word;
      min-height: 18px;
    }

    /* ── Per-status theming ── */
    .s-idle     .status-pip { background: var(--text-disabled); box-shadow: none; }
    .s-thinking .status-pip { background: var(--purple);        box-shadow: 0 0 6px var(--purple);   animation: blink 1.4s ease-in-out infinite; }
    .s-working  .status-pip { background: var(--warning);       box-shadow: 0 0 6px var(--warning);  animation: blink 0.7s ease-in-out infinite; }
    .s-approval .status-pip { background: var(--accent);        box-shadow: 0 0 8px var(--accent);   animation: blink 0.35s ease-in-out infinite; }
    .s-success  .status-pip { background: var(--success);       box-shadow: 0 0 8px var(--success); }
    .s-error    .status-pip,
    .s-warning  .status-pip { background: var(--warning);       box-shadow: 0 0 6px var(--warning); }

    .s-idle     .status-label { color: var(--text-disabled); }
    .s-thinking .status-label { color: var(--purple); }
    .s-working  .status-label { color: var(--warning); }
    .s-approval .status-label { color: var(--accent); }
    .s-success  .status-label { color: var(--success); }
    .s-error    .status-label,
    .s-warning  .status-label { color: var(--warning); }

    .s-thinking .mascot-glyph { color: var(--purple); }
    .s-working  .mascot-glyph { color: var(--warning); }
    .s-approval .mascot-glyph { color: var(--accent); }
    .s-success  .mascot-glyph { color: var(--success); }

    /* Approval card: left accent border */
    .s-approval .agent-card {
      border-left: 2px solid var(--accent);
      padding-left: 14px;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── Approval controls ── */
    .controls {
      display: none;
      gap: 6px;
      margin-top: 10px;
    }
    .s-approval .controls { display: flex; }

    .btn {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 0;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 150ms ease-out;
      -webkit-app-region: no-drag;
    }
    .btn:hover  { opacity: 0.7; }
    .btn:active { opacity: 0.45; }
    .btn-approve {
      background: transparent;
      border: 1px solid var(--success);
      color: var(--success);
    }
    .btn-deny {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    /* ── Footer bar: SENTINEL label + LOG button ── */
    #footer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      -webkit-app-region: drag;
    }

    #panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-disabled);
    }

    #log-toggle {
      -webkit-app-region: no-drag;
      background: transparent;
      border: 1px solid var(--border-visible);
      border-radius: 4px;
      color: var(--text-disabled);
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 150ms ease-out, color 150ms ease-out;
    }
    #log-toggle:hover  { border-color: var(--text-secondary); color: var(--text-secondary); }
    #log-toggle.active { border-color: var(--text-primary);   color: var(--text-primary); }

    /* ── Log panel — slides down below cards ── */
    #log-panel {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 300ms cubic-bezier(0.25,0.1,0.25,1),
                  opacity    250ms cubic-bezier(0.25,0.1,0.25,1);
    }
    #log-panel.open {
      max-height: 240px;
      opacity: 1;
    }

    #log-inner {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .log-header {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-disabled);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }

    #log-feed {
      max-height: 170px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #log-feed::-webkit-scrollbar { width: 2px; }
    #log-feed::-webkit-scrollbar-track { background: transparent; }
    #log-feed::-webkit-scrollbar-thumb { background: var(--border-visible); border-radius: 1px; }

    .log-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-row:last-child { border-bottom: none; }

    .log-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
      background: var(--text-disabled);
    }
    .log-row.ls-success          .log-dot { background: var(--success); }
    .log-row.ls-working          .log-dot { background: var(--warning); }
    .log-row.ls-thinking         .log-dot { background: var(--purple); }
    .log-row.ls-needs_approval   .log-dot { background: var(--accent); }
    .log-row.ls-error            .log-dot,
    .log-row.ls-warning          .log-dot { background: var(--accent); }

    .log-text {
      flex: 1;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .log-text strong { color: var(--text-primary); font-weight: 500; }

    .log-time {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--text-disabled);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      padding: 20px 24px 6px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-disabled);
    }
  </style>
</head>
<body>
  <div id="panel">
    <div id="agents-area">
      <div id="empty-state">No agents</div>
    </div>
    <div id="footer-bar">
      <span id="panel-title">Sentinel</span>
      <button id="log-toggle" onclick="toggleLog()">Log</button>
    </div>
    <div id="log-panel">
      <div id="log-inner">
        <div class="log-header">Activity</div>
        <div id="log-feed"></div>
      </div>
    </div>
  </div>

  <script>
    const IDLE_TIMEOUT = 120000; // 2 minutes

    let lastSessions = '';
    let lastHistory  = '';
    let eventSource  = null;
    let hideTimers   = {};

    // Mascot glyphs per agent id/name (Doto dot-matrix letters)
    function mascotGlyph(id, name) {
      const n = (name || id || '').toUpperCase();
      if (n.startsWith('GEMINI') || n === 'MAIN') return 'G';
      if (n.startsWith('CLAUDE'))                  return 'C';
      if (n.startsWith('GPT') || n.startsWith('OPENAI')) return 'O';
      // First letter of the name as fallback
      return n.charAt(0) || '?';
    }

    function toggleLog() {
      const panel = document.getElementById('log-panel');
      const btn   = document.getElementById('log-toggle');
      const open  = panel.classList.toggle('open');
      btn.classList.toggle('active', open);
    }

    function statusClass(status) {
      const map = {
        idle:           's-idle',
        thinking:       's-thinking',
        working:        's-working',
        needs_approval: 's-approval',
        success:        's-success',
        error:          's-error',
        warning:        's-warning',
      };
      return map[status] || 's-idle';
    }

    function statusLabel(status) {
      const map = {
        idle:           'Ready',
        thinking:       'Thinking',
        working:        'Working',
        needs_approval: 'Approval',
        success:        'Done',
        error:          'Error',
        warning:        'Warning',
      };
      return map[status] || status;
    }

    function scheduleHide(id, timestamp) {
      if (hideTimers[id]) clearTimeout(hideTimers[id]);
      const age       = Date.now() - timestamp;
      const remaining = IDLE_TIMEOUT - age;
      if (remaining <= 0) {
        hideCard(id);
      } else {
        hideTimers[id] = setTimeout(() => hideCard(id), remaining);
      }
    }

    function hideCard(id) {
      const wrap = document.querySelector(`[data-session-id="${id}"]`);
      if (wrap) wrap.classList.add('hidden');
      updateEmptyState();
      updateLastVisible();
    }

    function showCard(id) {
      if (hideTimers[id]) clearTimeout(hideTimers[id]);
      const wrap = document.querySelector(`[data-session-id="${id}"]`);
      if (wrap) wrap.classList.remove('hidden');
      updateEmptyState();
      updateLastVisible();
    }

    // Remove right border from last visible card
    function updateLastVisible() {
      const area  = document.getElementById('agents-area');
      const wraps = [...area.querySelectorAll('.agent-wrap:not(.hidden)')];
      area.querySelectorAll('.agent-wrap').forEach(w => w.classList.remove('last-visible'));
      if (wraps.length > 0) wraps[wraps.length - 1].classList.add('last-visible');
    }

    function updateEmptyState() {
      const area    = document.getElementById('agents-area');
      const visible = area.querySelectorAll('.agent-wrap:not(.hidden)');
      const empty   = document.getElementById('empty-state');
      empty.style.display = visible.length === 0 ? 'block' : 'none';
    }

    function makeCard(s) {
      const wrap = document.createElement('div');
      wrap.className = 'agent-wrap';
      wrap.dataset.sessionId = s.id;

      const card = document.createElement('div');
      card.className = 'agent-card';

      // Mascot row: big Doto glyph + status pip
      const mascotRow = document.createElement('div');
      mascotRow.className = 'mascot-row';

      const glyph = document.createElement('div');
      glyph.className = 'mascot-glyph';
      glyph.textContent = mascotGlyph(s.id, s.name);

      const pipWrap = document.createElement('div');
      pipWrap.className = 'status-pip-wrap';
      const pip = document.createElement('div');
      pip.className = 'status-pip';
      pipWrap.appendChild(pip);

      mascotRow.appendChild(glyph);
      mascotRow.appendChild(pipWrap);

      // Name
      const name = document.createElement('div');
      name.className = 'agent-name';

      // Status label
      const label = document.createElement('div');
      label.className = 'status-label';

      // Task
      const task = document.createElement('div');
      task.className = 'task-text';

      // Controls
      const controls = document.createElement('div');
      controls.className = 'controls';
      const approve = document.createElement('button');
      approve.className = 'btn btn-approve';
      approve.textContent = 'Approve';
      approve.onclick = () => action(s.id, 'approve');
      const deny = document.createElement('button');
      deny.className = 'btn btn-deny';
      deny.textContent = 'Deny';
      deny.onclick = () => action(s.id, 'deny');
      controls.appendChild(approve);
      controls.appendChild(deny);

      card.appendChild(mascotRow);
      card.appendChild(name);
      card.appendChild(label);
      card.appendChild(task);
      card.appendChild(controls);
      wrap.appendChild(card);
      return wrap;
    }

    function renderSessions(sessions) {
      const area = document.getElementById('agents-area');
      const ids  = new Set(Object.keys(sessions));

      // Remove stale cards
      area.querySelectorAll('[data-session-id]').forEach(el => {
        if (!ids.has(el.dataset.sessionId)) el.remove();
      });

      Object.values(sessions).forEach(s => {
        let wrap = area.querySelector(`[data-session-id="${s.id}"]`);
        if (!wrap) {
          wrap = makeCard(s);
          area.appendChild(wrap);
        }

        // Update status class (keep hidden class if set)
        const hidden = wrap.classList.contains('hidden');
        wrap.className = `agent-wrap ${statusClass(s.status)}${hidden ? ' hidden' : ''}`;

        // Update content
        const glyph = wrap.querySelector('.mascot-glyph');
        if (glyph) glyph.textContent = mascotGlyph(s.id, s.name);
        wrap.querySelector('.agent-name').textContent   = s.name || s.id;
        wrap.querySelector('.status-label').textContent = statusLabel(s.status);
        wrap.querySelector('.task-text').textContent    = (s.status === 'idle') ? '' : (s.task || '');

        if (s.status === 'idle') {
          scheduleHide(s.id, s.timestamp || Date.now());
        } else {
          showCard(s.id);
        }
      });

      updateEmptyState();
      updateLastVisible();
    }

    function renderHistory(history) {
      const feed = document.getElementById('log-feed');
      feed.innerHTML = '';
      history.forEach(h => {
        const row = document.createElement('div');
        row.className = `log-row ls-${h.status}`;

        const dot = document.createElement('div');
        dot.className = 'log-dot';

        const text = document.createElement('div');
        text.className = 'log-text';
        const strong = document.createElement('strong');
        strong.textContent = (h.name || h.id) + ' ';
        text.appendChild(strong);
        text.appendChild(document.createTextNode(h.task || ''));

        const time = document.createElement('div');
        time.className = 'log-time';
        time.textContent = h.time || '';

        row.appendChild(dot);
        row.appendChild(text);
        row.appendChild(time);
        feed.appendChild(row);
      });
    }

    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('http://localhost:49152/stream');
      eventSource.addEventListener('update', e => {
        try {
          const { sessions, history } = JSON.parse(e.data);
          const ss = JSON.stringify(sessions);
          const hs = JSON.stringify(history);
          if (ss !== lastSessions) { lastSessions = ss; renderSessions(sessions); }
          if (hs !== lastHistory)  { lastHistory  = hs; renderHistory(history); }
        } catch(_) {}
      });
      eventSource.onerror = () => {
        eventSource.close();
        setTimeout(connectSSE, 5000);
      };
    }

    async function action(id, type) {
      await fetch('http://localhost:49152/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action: type })
      });
    }

    connectSSE();
  </script>
</body>
</html>
